<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCFPM | Welcome</title>
    <style>
        :root {
            --bg: #fdf4ff;
            --primary: #8b5cf6;
            --sunny: #fbbf24;
            --pink: #ec4899;
            --teal: #14b8a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: #1e293b;
        }

        /* Floating Smileys Background */
        .smiley-stream {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .smiley {
            position: absolute;
            font-size: 2rem;
            animation: float 6s infinite ease-in-out;
            cursor: default;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .smiley:hover { transform: scale(1.5) rotate(15deg); }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Small, Neat Interface Card */
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 4px solid #fff;
            outline: 2px solid #e2e8f0;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .brand {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -1px;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #0f172a;
        }

        p {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background: var(--pink);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            transition: 0.2s;
            box-shadow: 0 4px 0 #be185d;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #be185d;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #be185d;
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="smiley-stream">
        <div class="smiley" style="top: 15%; left: 10%; animation-delay: 0s;">😊</div>
        <div class="smiley" style="top: 25%; right: 15%; animation-delay: 1s;">😎</div>
        <div class="smiley" style="bottom: 20%; left: 20%; animation-delay: 2s;">🤩</div>
        <div class="smiley" style="top: 60%; right: 10%; animation-delay: 0.5s;">🥳</div>
        <div class="smiley" style="bottom: 10%; right: 25%; animation-delay: 1.5s;">🌈</div>
    </div>

    <div class="card">
        <span class="brand">ROCFPM</span>
        <h1>Welcome to the hub.</h1>
        <p>A compact space for big ideas. We're keeping things light, colorful, and strictly positive.</p>
        <a href="http://rocfpm.hooooooooooot.pp.ua" class="btn">Explore Now</a>
        <div class="footer-text">est. 2026</div>
    </div>

</body>
</html>
